name: Android Build Verification

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-build:
    name: Build Android APK (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Create google-services.json placeholder
        run: |
          # Use the placeholder google-services.json already in repo
          echo "Using existing google-services.json"
          cat android/app/google-services.json

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AgroSmartHub-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Generate Direct Download Link (File.io)
        id: upload-apk
        run: |
          echo "Uploading APK to file.io for direct mobile download..."
          RESPONSE=$(curl -F "file=@android/app/build/outputs/apk/debug/app-debug.apk" https://file.io)
          LINK=$(echo $RESPONSE | grep -o '"link":"[^"]*' | cut -d'"' -f4)
          echo "================================================="
          echo " APK DIRECT DOWNLOAD LINK (Valid for 1 download/14 days):"
          echo " $LINK"
          echo "================================================="
          echo "download_link=$LINK" >> $GITHUB_OUTPUT
          
          # Save the link to a file for GitHub Pages
          mkdir -p gh-pages-apk-link
          echo $LINK > gh-pages-apk-link/apk_link.txt

      - name: Deploy APK Link to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-apk-link
          publish_branch: gh-pages
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Update dynamic APK download link"

      - name: Print Build Summary
        run: |
          echo "================================================="
          echo " Android Build: SUCCESS"
          echo " APK available as workflow artifact"
          echo " Direct Mobile Link: ${{ steps.upload-apk.outputs.download_link }}"
          echo "================================================="
