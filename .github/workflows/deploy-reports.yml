# ============================================================
# AgroSmartHub 3.0 — Manual Report Re-Deploy Workflow
# Re-publishes already-generated reports to GitHub Pages
# without re-running Appium tests.
# ============================================================

name: Deploy Reports to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: 'Run ID to fetch artifacts from (leave empty for latest)'
        required: false
        default: ''
      build_number:
        description: 'Override build number label'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: 🚀 Deploy Reports to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ─── 1. Checkout ────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node ──────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ─── 3. Download Artifacts ──────────────────────────────
      - name: 📦 Download Test Artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-reports-build-${{ github.event.inputs.build_number || github.run_number }}
          path: downloaded-reports/
        continue-on-error: true

      # ─── 4. Prepare Deploy Directory ───────────────────────
      - name: 🗂 Prepare GitHub Pages Structure
        run: |
          BUILD_NUM=$(printf "%03d" ${{ github.event.inputs.build_number || github.run_number }})

          mkdir -p gh-pages-deploy/reports/latest
          mkdir -p "gh-pages-deploy/reports/history/build-${BUILD_NUM}"

          # Copy from downloaded artifacts
          if [ -d "downloaded-reports/Test Results/HTML" ]; then
            cp -r "downloaded-reports/Test Results/HTML/." gh-pages-deploy/reports/latest/
            cp -r "downloaded-reports/Test Results/HTML/." "gh-pages-deploy/reports/history/build-${BUILD_NUM}/"
            echo "✅ HTML reports copied from artifacts"
          else
            # Fallback — check if reports exist locally (from same run)
            if [ -d "Test Results/HTML" ]; then
              cp -r "Test Results/HTML/." gh-pages-deploy/reports/latest/
              cp -r "Test Results/HTML/." "gh-pages-deploy/reports/history/build-${BUILD_NUM}/"
              echo "✅ HTML reports copied from local Test Results"
            else
              echo "⚠ No reports found — creating placeholder"
              cat > gh-pages-deploy/reports/latest/execution-report.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AgroSmartHub — No Report Available</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0f1a; color: #f9fafb;
           display: flex; align-items: center; justify-content: center; min-height: 100vh;
           flex-direction: column; gap: 16px; }
  </style>
</head>
<body>
  <div style="font-size: 64px;">🌾</div>
  <h1>No Test Report Available</h1>
  <p style="color: #6b7280;">Run the E2E tests workflow first to generate a report.</p>
</body>
</html>
EOF
            fi
          fi

          # Copy screenshots & logs
          if [ -d "downloaded-reports/Test Results/Screenshots" ]; then
            cp -r "downloaded-reports/Test Results/Screenshots" gh-pages-deploy/reports/latest/screenshots
          fi
          if [ -d "downloaded-reports/Test Results/Logs" ]; then
            cp -r "downloaded-reports/Test Results/Logs" gh-pages-deploy/reports/latest/logs
          fi
          if [ -f "downloaded-reports/Test Results/Summary/summary.md" ]; then
            cp "downloaded-reports/Test Results/Summary/summary.md" gh-pages-deploy/reports/latest/summary.md
          fi

          # Root redirect index
          cat > gh-pages-deploy/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=reports/latest/execution-report.html" />
  <title>AgroSmartHub E2E Reports</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0f1a; color: #f9fafb;
           display: flex; align-items: center; justify-content: center; min-height: 100vh;
           flex-direction: column; gap: 16px; }
    a { color: #22c55e; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div style="font-size: 48px;">🌾</div>
  <h1>AgroSmartHub E2E Reports</h1>
  <p>Redirecting to latest report...</p>
  <p><a href="reports/latest/execution-report.html">Click here if not redirected</a></p>
</body>
</html>
HTMLEOF

          echo "Build ${BUILD_NUM} ready for deployment"
          ls -la gh-pages-deploy/reports/latest/

      # ─── 5. Deploy to GitHub Pages ─────────────────────────
      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            📊 Manual Report Deploy — Build #${{ github.event.inputs.build_number || github.run_number }}

      # ─── 6. Print Report URL ────────────────────────────────
      - name: 📄 Print Report URL
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "✅ Reports deployed to GitHub Pages!"
          echo ""
          echo "📄 Live Report URL:"
          echo "   https://${OWNER}.github.io/${REPO}/reports/latest/execution-report.html"
          echo ""
          echo "🏠 Homepage:"
          echo "   https://${OWNER}.github.io/${REPO}/"
          echo "═══════════════════════════════════════════════════════"
