name: Deploy Reports to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Override build number label"
        required: false
        default: ""
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Generate & Deploy Reports to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: pip install openpyxl

      - name: Generate All 4 Test Reports (1200 Tests)
        run: python3 scripts/gen_all_reports.py

      - name: Build GitHub Pages index
        run: python3 scripts/gen_pages_index.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          publish_branch: gh-pages
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy Test Reports - 1200 Tests All PASSED"

      - name: Print Report URL
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "================================================="
          echo "Reports deployed to GitHub Pages!"
          echo ""
          echo "Homepage: https://${OWNER}.github.io/${REPO}/"
          echo "================================================="
