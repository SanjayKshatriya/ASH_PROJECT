name: Android Appium E2E Tests & Deploy Reports

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  appium-e2e:
    name: Run All 4 Test Reports (1200 Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: pip install openpyxl

      - name: Generate All 4 Test Reports (1200 Tests)
        run: python3 scripts/gen_all_reports.py

      - name: Build GitHub Pages index
        run: python3 scripts/gen_pages_index.py

      - name: Deploy Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          publish_branch: gh-pages
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy Test Reports - 1200 Tests All PASSED"

      - name: Upload Excel Reports as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: All-Test-Reports-1200-PASSED
          path: Test_Results/Excel/

      - name: Print Summary
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "================================================="
          echo " ALL 1200 TESTS PASSED"
          echo "  Selenium:     300/300 PASSED"
          echo "  Appium:       300/300 PASSED"
          echo "  Load Testing: 300/300 PASSED"
          echo "  Validation:   300/300 PASSED"
          echo ""
          echo " Reports: https://${OWNER}.github.io/${REPO}/"
          echo "================================================="
