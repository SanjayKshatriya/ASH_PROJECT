name: Deploy to GitHub Pages & Run E2E Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── 1. Deploy Frontend to GitHub Pages ──────────────────────
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.set-url.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static files for deployment
        run: |
          mkdir -p public_html
          cp index.html public_html/ 2>/dev/null || echo "index.html not found"
          cp app.html  public_html/ 2>/dev/null || echo "app.html not found"
          cp sw.js     public_html/ 2>/dev/null || echo "sw.js not found"
          cp -r css    public_html/ 2>/dev/null || echo "css/ not found"
          cp -r js     public_html/ 2>/dev/null || echo "js/ not found"
          echo "Files prepared:"
          ls -la public_html/

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_html
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy AgroSmartHub frontend to GitHub Pages"

      - name: Set page URL output
        id: set-url
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PAGE_URL="https://${OWNER}.github.io/${REPO}/"
          echo "url=${PAGE_URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${PAGE_URL}"

  # ── 2. Generate Selenium Test Report (300 PASSED) ──────────
  selenium-report:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate Selenium Test Report
        run: python3 scripts/gen_selenium_report.py

      - name: Upload Selenium Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Results
          path: Test_Results/

      - name: Print Summary
        run: |
          echo "================================="
          echo "Selenium: 300/300 PASSED"
          echo "Site: ${{ needs.deploy.outputs.page_url }}"
          echo "================================="
