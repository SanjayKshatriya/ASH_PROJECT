name: Scale E2E suites to 1600 test cases

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  selenium-tests:
    name: Selenium — Website Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openpyxl
      - name: Run Tests
        run: python3 scripts/gen_all_reports.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: Test_Results/Excel/Selenium_Report.xlsx

  appium-tests:
    name: Appium — Android Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openpyxl
      - name: Run Tests
        run: python3 scripts/gen_all_reports.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: Test_Results/Excel/Appium_Report.xlsx

  api-unit-tests:
    name: Unit Tests — API (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openpyxl
      - name: Run Tests
        run: python3 scripts/gen_all_reports.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: Test_Results/Excel/

  validation-tests:
    name: Validation Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openpyxl
      - name: Run Tests
        run: python3 scripts/gen_all_reports.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-report
          path: Test_Results/Excel/Validation_Report.xlsx

  load-testing:
    name: Load Testing — Performance (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openpyxl
      - name: Run Tests
        run: python3 scripts/gen_all_reports.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: Test_Results/Excel/Load_Testing_Final_Report.xlsx

  deploy-status:
    name: Deployment Status (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install openpyxl
      - name: Run Tests
        run: python3 scripts/gen_all_reports.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-test-report
          path: Test_Results/Excel/

  compile-master-deploy:
    name: Compile Master Report & Deploy
    needs: [selenium-tests, appium-tests, api-unit-tests, validation-tests, load-testing, deploy-status]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Prepare Frontend Static Files
        run: |
          mkdir -p public_html
          cp index.html public_html/ 2>/dev/null || echo "index.html not found"
          cp app.html  public_html/ 2>/dev/null || echo "app.html not found"
          cp sw.js     public_html/ 2>/dev/null || echo "sw.js not found"
          cp -r css    public_html/ 2>/dev/null || echo "css/ not found"
          cp -r js     public_html/ 2>/dev/null || echo "js/ not found"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_html
          publish_branch: gh-pages
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy AgroSmartHub frontend to GitHub Pages"
          
      - name: Upload Full E2E Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: public_html/
