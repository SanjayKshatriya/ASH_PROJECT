<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroSmartHub 3.0 — Dashboard</title>
  <meta name="description" content="AgroSmartHub 3.0 AI Agriculture Dashboard" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌾%3C/text%3E%3C/svg%3E" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"
    rel="stylesheet" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/components.css" />

  <style>
    /* ═══════════════════════════════════════════════════
       APP SHELL — PREMIUM DASHBOARD LAYOUT
    ═══════════════════════════════════════════════════ */

    /* ─── LOADING SCREEN ─── */
    #appLoading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #030a05, #071a0c, #0d2b16);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #16a34a, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 24px;
      animation: loadingPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(22, 163, 74, .5);
    }

    @keyframes loadingPulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 40px rgba(22, 163, 74, .5);
      }

      50% {
        transform: scale(1.06);
        box-shadow: 0 0 60px rgba(22, 163, 74, .8);
      }
    }

    .loading-title {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4ade80, #2dd4bf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .loading-text {
      font-size: .8rem;
      color: rgba(107, 114, 128, .8);
      margin-bottom: 32px;
      font-family: 'JetBrains Mono', monospace;
      min-height: 1.2em;
    }

    .loading-bar-wrap {
      width: 220px;
      height: 3px;
      border-radius: 99px;
      background: rgba(34, 197, 94, .1);
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #16a34a, #2dd4bf);
      animation: loadBar 2s ease forwards;
    }

    @keyframes loadBar {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    /* ─── APP SHELL ─── */
    #appShell {
      display: none;
      min-height: 100vh;
      flex-direction: row;
      background: var(--bg-900);
    }

    /* ─── SIDEBAR ─── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      height: 100vh;
      position: sticky;
      top: 0;
      left: 0;
      background: rgba(7, 26, 12, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(34, 197, 94, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .3s cubic-bezier(.4, 0, .2, 1), min-width .3s cubic-bezier(.4, 0, .2, 1);
      z-index: 50;
    }

    #sidebar.collapsed {
      width: 68px;
      min-width: 68px;
    }

    #sidebar.collapsed .nav-text,
    #sidebar.collapsed .user-info-sm,
    #sidebar.collapsed .nav-section-title,
    #sidebar.collapsed .sidebar-version {
      display: none !important;
    }

    #sidebar.collapsed .nav-badge {
      display: none;
    }

    /* Sidebar header */
    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(34, 197, 94, .08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #16a34a, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 16px rgba(22, 163, 74, .35);
    }

    .sidebar-logo-text {
      font-size: .9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4ade80, #2dd4bf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    #sidebarToggle {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: rgba(34, 197, 94, .08);
      border: 1px solid rgba(34, 197, 94, .15);
      color: #4ade80;
      cursor: pointer;
      font-size: .7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s ease;
      flex-shrink: 0;
    }

    #sidebarToggle:hover {
      background: rgba(34, 197, 94, .18);
      border-color: rgba(34, 197, 94, .35);
    }

    /* User card */
    #sidebarUser {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(34, 197, 94, .06);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      cursor: pointer;
      transition: .2s ease;
    }

    #sidebarUser:hover {
      background: rgba(34, 197, 94, .04);
    }

    .user-avatar-sm {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 12px rgba(22, 163, 74, .3);
    }

    .user-info-sm {
      overflow: hidden;
    }

    .user-name-sm {
      font-size: .82rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-role-sm {
      font-size: .68rem;
      color: rgba(107, 114, 128, .8);
      text-transform: capitalize;
    }

    .user-online-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
      box-shadow: 0 0 6px #22c55e;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* Nav */
    #sidebarNav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
    }

    #sidebarNav::-webkit-scrollbar {
      width: 3px;
    }

    #sidebarNav::-webkit-scrollbar-thumb {
      background: rgba(34, 197, 94, .2);
      border-radius: 99px;
    }

    .nav-section {
      margin-bottom: 4px;
    }

    .nav-section-title {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: rgba(107, 114, 128, .6);
      padding: 10px 10px 4px;
      white-space: nowrap;
    }

    .nav-link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 10px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: rgba(187, 247, 208, .65);
      font-family: 'Outfit', sans-serif;
      font-size: .83rem;
      font-weight: 500;
      cursor: pointer;
      transition: .2s ease;
      text-align: left;
      position: relative;
      white-space: nowrap;
    }

    .nav-link-item:hover {
      background: rgba(34, 197, 94, .08);
      color: #f0fdf4;
    }

    .nav-link-item.active {
      background: linear-gradient(135deg, rgba(22, 163, 74, .2), rgba(13, 148, 136, .12));
      color: #4ade80;
      font-weight: 600;
      border: 1px solid rgba(34, 197, 94, .2);
    }

    .nav-link-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 18px;
      border-radius: 0 3px 3px 0;
      background: #4ade80;
    }

    .nav-icon {
      font-size: 1rem;
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }

    .nav-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-badge {
      font-size: .6rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 99px;
      background: linear-gradient(135deg, #16a34a, #0d9488);
      color: #fff;
      flex-shrink: 0;
    }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(34, 197, 94, .06);
      flex-shrink: 0;
    }

    .sidebar-version {
      font-size: .62rem;
      color: rgba(107, 114, 128, .5);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .btn-sidebar-logout {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: rgba(239, 68, 68, .06);
      color: rgba(248, 113, 113, .7);
      font-family: 'Outfit', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: .2s ease;
      margin-top: 8px;
    }

    .btn-sidebar-logout:hover {
      background: rgba(239, 68, 68, .15);
      color: #f87171;
    }

    /* ─── MAIN CONTENT ─── */
    #mainContent {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ─── TOPBAR ─── */
    #topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(7, 26, 12, .7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(34, 197, 94, .08);
      position: sticky;
      top: 0;
      z-index: 40;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-hamburger {
      display: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(34, 197, 94, .15);
      background: rgba(34, 197, 94, .06);
      color: #4ade80;
      cursor: pointer;
      font-size: 1.1rem;
      align-items: center;
      justify-content: center;
    }

    .topbar-title-wrap {
      display: flex;
      flex-direction: column;
    }

    #topbarTitle {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
    }

    #topbarSub {
      font-size: .72rem;
      color: rgba(107, 114, 128, .8);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* search */
    .topbar-search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 10px;
      background: rgba(0, 0, 0, .35);
      border: 1px solid rgba(34, 197, 94, .12);
      font-size: .83rem;
      color: rgba(107, 114, 128, .7);
      cursor: pointer;
      transition: .2s ease;
    }

    .topbar-search:hover {
      border-color: rgba(34, 197, 94, .3);
      color: rgba(187, 247, 208, .8);
    }

    .topbar-search input {
      background: none;
      border: none;
      outline: none;
      color: #f0fdf4;
      font-family: 'Outfit', sans-serif;
      font-size: .83rem;
      width: 160px;
    }

    .topbar-search input::placeholder {
      color: rgba(107, 114, 128, .6);
    }

    /* icon buttons */
    .topbar-icon-btn {
      position: relative;
      width: 38px;
      height: 38px;
      border-radius: 9px;
      border: 1px solid rgba(34, 197, 94, .12);
      background: rgba(0, 0, 0, .25);
      color: rgba(187, 247, 208, .7);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .2s ease;
    }

    .topbar-icon-btn:hover {
      background: rgba(34, 197, 94, .1);
      border-color: rgba(34, 197, 94, .3);
      color: #4ade80;
    }

    .topbar-notif-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      font-size: .55rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--bg-900);
    }

    /* avatar */
    #topbarAvatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: 2px solid rgba(34, 197, 94, .25);
      transition: .2s ease;
    }

    #topbarAvatar:hover {
      border-color: rgba(34, 197, 94, .6);
      transform: scale(1.06);
    }

    /* Dark mode toggle */
    #themeToggle {
      width: 50px;
      height: 26px;
      border-radius: 13px;
      background: rgba(0, 0, 0, .3);
      border: 1px solid rgba(34, 197, 94, .2);
      position: relative;
      cursor: pointer;
      transition: .3s ease;
    }

    #themeToggle::after {
      content: '🌙';
      position: absolute;
      top: 2px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #16a34a, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      transition: .3s ease;
      line-height: 20px;
      text-align: center;
    }

    [data-theme="light"] #themeToggle::after {
      left: calc(100% - 23px);
      content: '☀️';
    }

    /* ─── PAGE CONTENT ─── */
    #pageContent {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    #pageContent::-webkit-scrollbar {
      width: 5px;
    }

    #pageContent::-webkit-scrollbar-thumb {
      background: rgba(34, 197, 94, .2);
      border-radius: 99px;
    }

    #pageContent::-webkit-scrollbar-track {
      background: transparent;
    }

    /* ─── SIDEBAR OVERLAY (mobile) ─── */
    #sidebarOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 49;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
    }

    /* ─── TOAST ─── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 10px;
      background: rgba(12, 25, 16, .95);
      border: 1px solid rgba(34, 197, 94, .2);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
      min-width: 260px;
      max-width: 360px;
      animation: toastIn .3s cubic-bezier(.34, 1.56, .64, 1);
      transition: opacity .3s;
      backdrop-filter: blur(12px);
    }

    @keyframes toastIn {
      from {
        transform: translateX(40px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .toast.error {
      border-color: rgba(239, 68, 68, .3);
    }

    .toast.warning {
      border-color: rgba(251, 191, 36, .3);
    }

    .toast.info {
      border-color: rgba(37, 99, 235, .3);
    }

    .toast-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }

    .toast-msg {
      flex: 1;
      font-size: .82rem;
      font-weight: 500;
    }

    .toast-close {
      background: none;
      border: none;
      color: rgba(107, 114, 128, .7);
      cursor: pointer;
      padding: 0 4px;
      font-size: .8rem;
    }

    /* ─── MOBILE ─── */
    @media(max-width:900px) {
      #sidebar {
        position: fixed;
        left: -260px;
        height: 100vh;
        z-index: 50;
        transition: left .3s cubic-bezier(.4, 0, .2, 1);
      }

      #sidebar.mobile-open {
        left: 0;
      }

      #sidebarOverlay.mobile-visible {
        display: block;
      }

      .topbar-hamburger {
        display: flex;
      }

      #pageContent {
        padding: 16px;
      }

      .topbar-search {
        display: none;
      }
    }

    @media(max-width:480px) {
      #topbar {
        padding: 0 16px;
      }

      #pageContent {
        padding: 12px;
      }
    }

    /* ─── CONTENT PAGE TRANSITIONS ─── */
    #pageContent>* {
      animation: pageIn .35s ease both;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* ─── LIGHT MODE ─── */
    [data-theme="light"] {
      --bg-900: #f8fafb;
      --bg-800: #eef2f5;
      --surface-1: #ffffff;
      --surface-2: #f0f4f7;
      --border: rgba(22, 163, 74, .15);
      --text-primary: #111827;
      --text-secondary: #1f2937;
      --text-muted: #6b7280;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(22, 163, 74, .15);
    }

    [data-theme="light"] body {
      background: #f0fdf4;
    }

    [data-theme="light"] #sidebar {
      background: rgba(255, 255, 255, .9);
    }

    [data-theme="light"] #topbar {
      background: rgba(255, 255, 255, .85);
    }

    [data-theme="light"] .glass-card {
      background: rgba(255, 255, 255, .8);
    }

    /* ─── SPINNER ─── */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* ─── PROFILE CARD ─── */
    .farmer-profile-card {
      padding: 28px 24px;
      border-radius: 16px;
      background: rgba(15, 31, 20, .7);
      border: 1px solid rgba(34, 197, 94, .12);
      backdrop-filter: blur(20px);
      text-align: center;
      margin-bottom: 20px;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 30px rgba(22, 163, 74, .4);
    }

    .profile-name {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .profile-id {
      font-size: .7rem;
      color: rgba(107, 114, 128, .7);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 12px;
    }

    .profile-badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .profile-badge {
      font-size: .7rem;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
    }

    .badge-verified {
      background: rgba(22, 163, 74, .15);
      border: 1px solid rgba(22, 163, 74, .3);
      color: #4ade80;
    }

    .badge-organic {
      background: rgba(13, 148, 136, .15);
      border: 1px solid rgba(13, 148, 136, .3);
      color: #2dd4bf;
    }

    .profile-stats {
      display: flex;
      justify-content: space-around;
      padding: 16px 0;
      border-top: 1px solid rgba(34, 197, 94, .1);
      border-bottom: 1px solid rgba(34, 197, 94, .1);
      margin-bottom: 16px;
    }

    .profile-stat-num {
      font-size: 1.2rem;
      font-weight: 800;
      color: #4ade80;
    }

    .profile-stat-label {
      font-size: .65rem;
      color: rgba(107, 114, 128, .7);
      margin-top: 2px;
    }

    .profile-qr {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 16px;
    }

    .profile-qr-wrap {
      padding: 8px;
      background: #fff;
      border-radius: 8px;
      display: inline-block;
    }

    /* ─── STATUS BADGES ─── */
    .status-badge {
      font-size: .72rem;
      font-weight: 700;
      padding: 4px 10px;

    let toastContainer;
    function getToastContainer() {
      if (!toastContainer) {
        toastContainer = document.createElement('div');
        toastContainer.className = 'toast-container';
        document.body.appendChild(toastContainer);
      }
      return toastContainer;
    }
    function showToast(msg, type = 'success', duration = 3500) {
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      const container = getToastContainer();
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span><span class="toast-msg">${msg}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
      container.appendChild(toast);
      setTimeout(() => toast.style.opacity = '0', duration - 400);
      setTimeout(() => toast.remove(), duration);
    }

      if (q.includes('market') || q.includes('price')) navigateTo('market-prices');

      else if (q.includes('iot') || q.includes('sensor')) navigateTo('iot-monitor');
      else if (q.includes('cert')) navigateTo('certificates');

    function initSupabaseRealtime() {
      if (!supabaseClient) return;
      // Listen for real-time product inserts

        .channel('products-changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'products' }, (payload) => {
          showToast(`New product listed: ${(payload.new && payload.new.name) ? payload.new.name : 'Unknown'}`, 'info');
        })
        .subscribe();

      // IoT sensor data
      const iotChannel = supabaseClient
        .channel('iot-sensors')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'iot_readings' }, (payload) => {
          updateIoTDisplay(payload.new);
        })
        .subscribe();

    function updateIoTDisplay(reading) {
      if (!reading) return;
      const map = {
        temperature: 'iotTemp',
        humidity: 'iotHumidity',
        soil_moisture: 'iotSoilMoisture',
        soil_ph: 'iotSoilPH'
      };
      Object.entries(map).forEach(([key, elId]) => {
        if (reading[key] !== undefined) {
          const el = document.getElementById(elId);
          if (el) el.textContent = reading[key];
        }
      });
    }

    function makeChart(id, type, labels, data, opts = {}) {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const existingChart = Chart.getChart(canvas);
      if (existingChart) existingChart.destroy();
      const gradient = canvas.getContext('2d').createLinearGradient(0, 0, 0, 200);
      gradient.addColorStop(0, 'rgba(22,163,74,0.35)');
      gradient.addColorStop(1, 'rgba(22,163,74,0.02)');

      return new Chart(canvas, {
        type,
        data: {
          labels,
          datasets: [{
            data,
            borderColor: '#16a34a',
            backgroundColor: type === 'line' ? gradient : opts.colors || [
              '#16a34a', '#0d9488', '#f59e0b', '#7c3aed', '#06b6d4', '#f97316'
            ],
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointHoverRadius: 6,
            pointBackgroundColor: '#16a34a',
            ...opts.datasetOpts
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: opts.legend || false },
            tooltip: {
              backgroundColor: 'rgba(12,25,16,.95)',
              borderColor: 'rgba(34,197,94,.25)',
              borderWidth: 1,
              titleFont: { family: "'Outfit',sans-serif", weight: '600' },
              bodyFont: { family: "'Outfit',sans-serif" },
              padding: 10
            }
          },
          scales: type !== 'pie' && type !== 'doughnut' ? {
            x: { grid: { color: 'rgba(34,197,94,.06)', drawBorder: false }, ticks: { font: { size: 10 } } },
            y: { grid: { color: 'rgba(34,197,94,.06)', drawBorder: false }, ticks: { font: { size: 10 } }, beginAtZero: true }
          } : {},
          ...opts.chartOpts
        }
      });

              <div class="notif-body">
                <div class="notif-title">${n.title}</div>
                <div class="notif-desc">${n.desc}</div>
                <div class="notif-time">${n.time}</div>
              </div>
              ${n.unread ? '<div class="notif-dot"></div>' : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
    }

    // ─── MY PRODUCTS ───
    function renderMyProducts(container) {
      updateTopbar('My Products', 'Manage your listings');
      if (typeof ASH === 'undefined' || !ASH.products) {
        container.innerHTML = `<div class="glass-card" style="padding:24px;text-align:center">Loading…</div>`;
        return;
      }
      container.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <h3 style="font-size:1rem;font-weight:700">🌾 My Listed Products</h3>
        <button class="btn-primary" style="font-size:.82rem;padding:9px 20px" onclick="showToast('Add product form coming soon!','info')">+ List New Product</button>
      </div>
      <div class="products-grid">
        ${ASH.products.map(p => buildProductCard(p)).join('')}
      </div>
    `;
    }

    // ─── INIT SUPABASE AFTER BOOT ───
    // (Called from app.js bootApp after everything loads)
    window._afterBoot = () => {
      initSupabaseRealtime();
      // Sync auth from Supabase
      if (supabaseClient) {
        supabaseClient.auth.getSession().then(({ data }) => {
          if (data && data.session) {
            const token = data.session.access_token;
            localStorage.setItem('ash_token', token);
          }
        });
      }
    };
  </script>

</body>

</html>
